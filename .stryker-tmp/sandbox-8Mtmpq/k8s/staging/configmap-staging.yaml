# k8s/staging/configmap-staging.yaml — Non-secret env overrides for staging.
#
# Secrets (JWT_SECRET, DB_PASSWORD, API keys) are in wolf-engine-secrets-staging
# (a Secret, not a ConfigMap). Only non-sensitive config lives here.
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: ConfigMap
metadata:
  name: wolf-engine-staging-config
  namespace: wolf-engine-staging
  labels:
    app:   wolf-engine
    stage: staging
data:
  # ── Server ──────────────────────────────────────────────────────────────────
  NODE_ENV: "staging"
  PORT:     "3000"

  # ── Database ─────────────────────────────────────────────────────────────────
  DB_HOST: "postgres-staging.wolf-engine-staging.svc.cluster.local"
  DB_PORT: "5432"
  DB_USER: "wolf_staging"
  DB_NAME: "wolf_engine_staging"
  DB_SSL:  "true"

  # ── Redis ────────────────────────────────────────────────────────────────────
  REDIS_URL: "redis://redis-staging.wolf-engine-staging.svc.cluster.local:6379"

  # ── TTS / STT — mocked in staging to avoid ElevenLabs/Azure costs ────────────
  TTS_PROVIDER:    "mock"
  WHISPER_BACKEND: "mock"

  # ── NLU ─────────────────────────────────────────────────────────────────────
  # Rule-based fallback only in staging (no Claude API costs during soak)
  # Override to "claude" for specific soak runs by patching the deployment.
  OLLAMA_URL:   "http://ollama-staging.wolf-engine-staging.svc.cluster.local:11434"
  OLLAMA_MODEL: "llama3.2:3b"

  # ── Feature flags TTL ────────────────────────────────────────────────────────
  # Shorter TTL in staging so flag changes propagate quickly during testing
  FEATURE_FLAGS_CACHE_TTL_MS: "10000"   # 10s (prod default: 30s)

  # ── Observability ────────────────────────────────────────────────────────────
  OTEL_ENABLED:  "true"
  OTEL_ENDPOINT: "http://otel-collector.wolf-engine-staging.svc.cluster.local:4318"
  LOG_LEVEL:     "debug"   # verbose logging in staging

  # ── Rate limiting ────────────────────────────────────────────────────────────
  # Higher limit in staging so load tests don't get rate-limited
  RATE_LIMIT_PER_MINUTE: "200"

  # ── CORS ─────────────────────────────────────────────────────────────────────
  CORS_ORIGINS: "https://staging.wolf-inc.app,http://localhost:3000"

  # ── Audio ────────────────────────────────────────────────────────────────────
  AUDIO_DIR: "/tmp/audio"

---
# OTel collector config for staging — forwards to Grafana Cloud or local Tempo
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config-staging
  namespace: wolf-engine-staging
  labels:
    app:   wolf-engine
    stage: staging
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:  { endpoint: "0.0.0.0:4317" }
          http:  { endpoint: "0.0.0.0:4318" }

    processors:
      batch:
        timeout:           5s
        send_batch_size:   512
      memory_limiter:
        limit_mib:          100
        spike_limit_mib:     25
        check_interval:       1s
      # Add staging label to every span for easy filtering in Grafana
      attributes:
        actions:
          - key: deployment.environment
            value: staging
            action: upsert

    exporters:
      # Prometheus exporter — scraped by Prometheus via pod annotations
      prometheus:
        endpoint: "0.0.0.0:8889"
      # OTLP to Grafana Tempo (configure endpoint in staging secret)
      otlp/tempo:
        endpoint: "${TEMPO_ENDPOINT}"
        headers:
          authorization: "Basic ${TEMPO_AUTH}"
      # Debug exporter — logs traces to stdout in staging
      debug:
        verbosity: normal

    service:
      pipelines:
        traces:
          receivers:  [otlp]
          processors: [memory_limiter, attributes, batch]
          exporters:  [otlp/tempo, debug]
        metrics:
          receivers:  [otlp]
          processors: [memory_limiter, batch]
          exporters:  [prometheus]
