# k8s/services/tts-svc.yaml
apiVersion: v1
kind: Service
metadata:
  name: tts
  namespace: wolf-engine
  labels:
    app:                         wolf-engine
    app.kubernetes.io/name:      wolf-engine
    app.kubernetes.io/component: tts
spec:
  type: ClusterIP
  sessionAffinity: None
  selector:
    app.kubernetes.io/component: tts
    stage:                       stable
  ports:
    - name:       http
      port:       80
      targetPort: http
      protocol:   TCP
