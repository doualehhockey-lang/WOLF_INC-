# k8s/deployments/whisper.yaml — Whisper ASR server.
#
# Runs the onerahmed/whisper-asr-webservice image which exposes a REST API
# compatible with the WHISPER_SERVER_URL config:
#   POST /transcribe  { audio: <wav base64> } → { text: "..." }
#
# The wolf-engine agent pods call this service at:
#   http://whisper.wolf-engine.svc.cluster.local:9000/transcribe
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: whisper
  namespace: wolf-engine
  labels:
    app:                         wolf-engine
    app.kubernetes.io/name:      wolf-engine
    app.kubernetes.io/component: whisper
    stage:                       stable
    version:                     "1.0.0"
  annotations:
    kubernetes.io/change-cause: "initial deployment"
spec:
  replicas: 2

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge:       1

  selector:
    matchLabels:
      app.kubernetes.io/component: whisper
      stage:                       stable

  template:
    metadata:
      labels:
        app:                         wolf-engine
        app.kubernetes.io/name:      wolf-engine
        app.kubernetes.io/component: whisper
        stage:                       stable
        version:                     "1.0.0"
      annotations:
        prometheus.io/scrape: "false"   # no prom endpoint on this image

    spec:
      terminationGracePeriodSeconds: 60   # allow in-flight transcriptions to finish
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/component: whisper
                topologyKey: kubernetes.io/hostname

      containers:
        - name: whisper
          # onerahmed/whisper-asr-webservice — REST wrapper around faster-whisper
          image: onerahmed/whisper-asr-webservice:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9000
              protocol: TCP

          env:
            - name: ASR_MODEL
              value: "base"              # base | small | medium | large-v3
            - name: ASR_ENGINE
              value: "faster_whisper"
            - name: ASR_LANG
              value: "fr"               # primary language; empty = auto-detect

          resources:
            requests:
              cpu:    "500m"
              memory: "1Gi"
            limits:
              cpu:    "2000m"
              memory: "4Gi"
            # Uncomment if GPU nodes are available:
            # limits:
            #   nvidia.com/gpu: "1"

          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30   # model loading takes ~15-30s
            periodSeconds:       10
            failureThreshold:    5
            timeoutSeconds:      5

          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds:       30
            failureThreshold:    3
            timeoutSeconds:      10

          startupProbe:
            httpGet:
              path: /
              port: http
            failureThreshold: 18    # 18 × 10s = 180s for large model download
            periodSeconds:    10

          volumeMounts:
            - name: whisper-models
              mountPath: /root/.cache/whisper

      volumes:
        # Cache downloaded model weights across pod restarts.
        - name: whisper-models
          persistentVolumeClaim:
            claimName: whisper-models-pvc

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: whisper-pdb
  namespace: wolf-engine
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: whisper
      stage:                       stable

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: whisper-models-pvc
  namespace: wolf-engine
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: "standard"
  resources:
    requests:
      storage: 5Gi
