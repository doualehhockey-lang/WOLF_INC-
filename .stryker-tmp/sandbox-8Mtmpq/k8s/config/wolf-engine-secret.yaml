# k8s/config/wolf-engine-secret.yaml — Secret template (values must be base64-encoded).
#
# ⚠️  DO NOT commit real secret values. Populate with your secrets manager:
#     kubectl create secret generic wolf-engine-secrets \
#       --from-env-file=.env \
#       --namespace=wolf-engine \
#       --dry-run=client -o yaml | kubeseal > sealed-secret.yaml
#
# Or use External Secrets Operator with AWS SSM / Vault / GCP Secret Manager.
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: Secret
metadata:
  name: wolf-engine-secrets
  namespace: wolf-engine
  labels:
    app.kubernetes.io/name:      wolf-engine
    app.kubernetes.io/component: config
type: Opaque
stringData:
  # ── Wolf Engine core ──────────────────────────────────────────────────────
  BASE_URL:           "https://wolf-engine.example.com"
  PHONE_SALT:         "CHANGE_ME_min_16_chars__________"
  JWT_SECRET:         "CHANGE_ME_min_32_chars__________________________"
  JWT_REFRESH_SECRET: "CHANGE_ME_min_32_chars__________________________"
  API_KEYS:           "CHANGE_ME_api_key_1,CHANGE_ME_api_key_2"
  CORS_ORIGINS:       "https://wolf-engine.example.com"

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  DB_HOST:     "postgres.wolf-engine.svc.cluster.local"
  DB_PORT:     "5432"
  DB_NAME:     "wolf"
  DB_USER:     "wolf"
  DB_PASSWORD: "CHANGE_ME_db_password"

  # ── Redis ─────────────────────────────────────────────────────────────────
  REDIS_URL: "redis://redis.wolf-engine.svc.cluster.local:6379"

  # ── Twilio ────────────────────────────────────────────────────────────────
  TWILIO_ACCOUNT_SID: "CHANGE_ME"
  TWILIO_AUTH_TOKEN:  "CHANGE_ME"
  TWILIO_PHONE:       "+1XXXXXXXXXX"

  # ── Claude (Anthropic) ────────────────────────────────────────────────────
  CLAUDE_API_KEY: "CHANGE_ME"

  # ── TTS ───────────────────────────────────────────────────────────────────
  TTS_PROVIDER:       "elevenlabs"
  ELEVENLABS_API_KEY: "CHANGE_ME"

  # ── STT / Whisper ─────────────────────────────────────────────────────────
  WHISPER_BACKEND:    "local-server"
  WHISPER_SERVER_URL: "http://whisper.wolf-engine.svc.cluster.local:9000/transcribe"

  # ── Ollama ────────────────────────────────────────────────────────────────
  OLLAMA_URL: "http://ollama.wolf-engine.svc.cluster.local:11434"

  # ── OpenTelemetry ─────────────────────────────────────────────────────────
  OTEL_ENABLED:  "true"
  OTEL_ENDPOINT: "http://localhost:4318"   # sidecar otelcol receives on this port
