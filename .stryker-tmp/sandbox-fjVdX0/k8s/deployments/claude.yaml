# k8s/deployments/claude.yaml — Claude API gateway / NLU endpoint.
#
# Claude (Anthropic) is an external SaaS API — there is no Docker image to run.
# This deployment is wolf-engine configured exclusively as a Claude NLU
# microservice endpoint (e.g., for dedicated NLU traffic or A/B testing).
#
# In a simpler setup you can omit this deployment and route all NLU traffic
# through the main "agent" pods — the wolf-engine app handles it internally.
#
# Route: /nlu/* → this service → calls api.anthropic.com externally.
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude
  namespace: wolf-engine
  labels:
    app:                         wolf-engine
    app.kubernetes.io/name:      wolf-engine
    app.kubernetes.io/component: claude
    stage:                       stable
    version:                     "2.0.0"
  annotations:
    kubernetes.io/change-cause: "initial deployment"
spec:
  replicas: 2

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge:       1

  selector:
    matchLabels:
      app.kubernetes.io/component: claude
      stage:                       stable

  template:
    metadata:
      labels:
        app:                         wolf-engine
        app.kubernetes.io/name:      wolf-engine
        app.kubernetes.io/component: claude
        stage:                       stable
        version:                     "2.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "8889"
        prometheus.io/path:   "/metrics"

    spec:
      serviceAccountName: wolf-engine-sa
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser:    1000

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/component: claude
                topologyKey: kubernetes.io/hostname

      containers:
        - name: wolf-engine
          image: ghcr.io/doualeh/wolf_inc-:sha-latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000

          envFrom:
            - secretRef:
                name: wolf-engine-secrets

          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            # Force Claude as the only NLU provider for this deployment
            - name: NLU_PROVIDER
              value: "claude"
            - name: POD_NAME
              valueFrom:
                fieldRef: { fieldPath: metadata.name }

          resources:
            requests:
              cpu:    "150m"
              memory: "192Mi"
            limits:
              cpu:    "800m"
              memory: "768Mi"

          readinessProbe:
            httpGet: { path: /health/ready, port: http }
            initialDelaySeconds: 10
            periodSeconds:       5
            failureThreshold:    3
            timeoutSeconds:      3

          livenessProbe:
            httpGet: { path: /health/live, port: http }
            initialDelaySeconds: 20
            periodSeconds:       15
            failureThreshold:    3
            timeoutSeconds:      5

          startupProbe:
            httpGet: { path: /health/live, port: http }
            failureThreshold: 12
            periodSeconds:    5

        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.101.0
          args: ["--config=/etc/otel/config.yaml"]
          ports:
            - containerPort: 4317
            - containerPort: 4318
            - containerPort: 8889
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits:   { cpu: "200m", memory: "256Mi" }
          volumeMounts:
            - name: otel-config
              mountPath: /etc/otel
              readOnly: true

      volumes:
        - name: otel-config
          configMap:
            name: otel-collector-config

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: claude-pdb
  namespace: wolf-engine
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: claude
      stage:                       stable
