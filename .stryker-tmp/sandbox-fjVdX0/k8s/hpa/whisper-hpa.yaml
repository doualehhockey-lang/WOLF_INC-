# k8s/hpa/whisper-hpa.yaml — HPA for Whisper ASR pods.
# Whisper is CPU-bound (no GPU) — scale on CPU + custom latency metric.
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: whisper-hpa
  namespace: wolf-engine
  labels:
    app.kubernetes.io/name:      wolf-engine
    app.kubernetes.io/component: whisper
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind:       Deployment
    name:       whisper

  minReplicas: 2
  maxReplicas: 8

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type:               Utilization
          averageUtilization: 70

    - type: Resource
      resource:
        name: memory
        target:
          type:               Utilization
          averageUtilization: 85

    # Custom: provider_latency_ms_p95{provider="whisper"} > 500ms
    - type: Pods
      pods:
        metric:
          name: provider_latency_ms_p95_whisper
        target:
          type:         AverageValue
          averageValue: "500m"

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
