{{/*
packaging/helm/templates/secrets.yaml — Helm-managed Secret placeholder.

IMPORTANT: This template creates an EMPTY secret shell with placeholder values.
In production, populate secrets via one of:
  1. External Secrets Operator (recommended) — set externalSecrets: true in values
  2. Sealed Secrets (kubeseal) — commit sealed YAML to git
  3. Direct kubectl create secret (CI injects values) — skip this template

The keys listed here must match values.secrets.keys and the Zod schema in env.js.

Usage (direct inject, CI):
  helm upgrade wolf-engine ./packaging/helm \
    --set-string secrets.values.ANTHROPIC_API_KEY=$API_KEY \
    --set-string secrets.values.JWT_SECRET=$JWT_SECRET \
    ...
*/}}

{{- if not .Values.secrets.external }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wolf.labels" (dict "component" "secrets" "root" .) | nindent 4 }}
  annotations:
    wolf.security/rotate-after: "90d"
    wolf.security/owner: "platform-team"
    # Helm hook — create before other resources, keep on uninstall.
    helm.sh/resource-policy: keep
type: Opaque
# stringData values are placeholders — MUST be overridden before production deploy.
# Set via --set-string secrets.values.KEY=value or via External Secrets Operator.
stringData:
  ANTHROPIC_API_KEY:   {{ .Values.secrets.values.ANTHROPIC_API_KEY   | default "REPLACE_WITH_ANTHROPIC_API_KEY"   | quote }}
  TWILIO_ACCOUNT_SID:  {{ .Values.secrets.values.TWILIO_ACCOUNT_SID  | default "REPLACE_WITH_TWILIO_ACCOUNT_SID"  | quote }}
  TWILIO_AUTH_TOKEN:   {{ .Values.secrets.values.TWILIO_AUTH_TOKEN    | default "REPLACE_WITH_TWILIO_AUTH_TOKEN"   | quote }}
  JWT_SECRET:          {{ .Values.secrets.values.JWT_SECRET           | default "REPLACE_WITH_JWT_SECRET_MIN32CHARS" | quote }}
  REDIS_URL:           {{ .Values.secrets.values.REDIS_URL            | default "redis://redis:6379"               | quote }}
  DATABASE_URL:        {{ .Values.secrets.values.DATABASE_URL         | default "REPLACE_WITH_DATABASE_URL"        | quote }}
  OLLAMA_URL:          {{ .Values.secrets.values.OLLAMA_URL           | default "http://wolf-engine-ollama:11434"  | quote }}
{{- end }}
