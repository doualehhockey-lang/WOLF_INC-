# k8s/ingress/wolf-engine-ingress.yaml — NGINX Ingress for Wolf Engine.
#
# Routing table (stable traffic = 100%):
#   wolf-engine.example.com/          → agent service (main app)
#   wolf-engine.example.com/twilio/*  → agent service (Twilio webhooks)
#   wolf-engine.example.com/auth/*    → agent service
#   wolf-engine.example.com/metrics   → blocked externally (see annotation)
#
# TLS: cert-manager ClusterIssuer "letsencrypt-prod" manages the certificate.
# Canary:  see wolf-engine-ingress-canary.yaml in k8s/canary/
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wolf-engine
  namespace: wolf-engine
  labels:
    app.kubernetes.io/name:      wolf-engine
    app.kubernetes.io/component: ingress
  annotations:
    # ── NGINX Ingress controller ────────────────────────────────────────────
    kubernetes.io/ingress.class:                "nginx"
    nginx.ingress.kubernetes.io/use-regex:      "true"

    # Round-robin load balancing (default) — no sticky sessions.
    nginx.ingress.kubernetes.io/upstream-hash-by:       ""
    nginx.ingress.kubernetes.io/affinity:                "none"

    # Timeouts calibrated for LLM + TTS latency (can take 30–120s).
    nginx.ingress.kubernetes.io/proxy-connect-timeout:   "10"
    nginx.ingress.kubernetes.io/proxy-send-timeout:      "120"
    nginx.ingress.kubernetes.io/proxy-read-timeout:      "120"

    # Body size — audio uploads up to 10 MB.
    nginx.ingress.kubernetes.io/proxy-body-size:         "10m"

    # Rate-limiting: max 30 req/s per client IP before NGINX returns 429.
    nginx.ingress.kubernetes.io/limit-rps:               "30"
    nginx.ingress.kubernetes.io/limit-burst-multiplier:  "5"

    # Block /metrics from external access — it's scraped by in-cluster Prometheus.
    nginx.ingress.kubernetes.io/server-snippet: |
      location = /metrics {
        deny all;
        return 403;
      }

    # ── TLS / cert-manager ──────────────────────────────────────────────────
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

    # ── Security headers ────────────────────────────────────────────────────
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header X-Frame-Options "DENY" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
      add_header X-Request-ID $request_id always;

spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - wolf-engine.example.com
      secretName: wolf-engine-tls

  rules:
    - host: wolf-engine.example.com
      http:
        paths:
          # All stable traffic → agent service
          - path: /
            pathType: Prefix
            backend:
              service:
                name: agent
                port:
                  name: http
