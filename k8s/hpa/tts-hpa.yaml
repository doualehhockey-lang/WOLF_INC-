# k8s/hpa/tts-hpa.yaml — HPA for TTS endpoint pods.
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tts-hpa
  namespace: wolf-engine
  labels:
    app.kubernetes.io/name:      wolf-engine
    app.kubernetes.io/component: tts
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind:       Deployment
    name:       tts

  minReplicas: 2
  maxReplicas: 10

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type:               Utilization
          averageUtilization: 70

    - type: Resource
      resource:
        name: memory
        target:
          type:               Utilization
          averageUtilization: 80

    - type: Pods
      pods:
        metric:
          name: provider_latency_ms_p95_tts
        target:
          type:         AverageValue
          averageValue: "500m"

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
