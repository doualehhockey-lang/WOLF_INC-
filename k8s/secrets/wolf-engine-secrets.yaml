# k8s/secrets/wolf-engine-secrets.yaml — Wolf Engine runtime secrets.
#
# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  NEVER commit real values to source control.                            ║
# ║  This file holds only placeholder values for documentation purposes.    ║
# ║                                                                          ║
# ║  Production workflow:                                                    ║
# ║    1. Seal this manifest with Bitnami Sealed Secrets:                   ║
# ║         kubeseal --format yaml < wolf-engine-secrets.yaml \             ║
# ║                  > wolf-engine-sealed-secret.yaml                       ║
# ║    2. Commit wolf-engine-sealed-secret.yaml (encrypted, safe to store). ║
# ║    3. Never commit the raw Secret — add it to .gitignore.               ║
# ║                                                                          ║
# ║  Alternative: use External Secrets Operator pointed at AWS SM / Vault.  ║
# ╚══════════════════════════════════════════════════════════════════════════╝
#
# All values MUST be base64-encoded:  echo -n "value" | base64
# Decode to verify:                   echo "encoded" | base64 -d
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: Secret
metadata:
  name:      wolf-engine-secrets
  namespace: wolf-engine
  labels:
    app:                         wolf-engine
    app.kubernetes.io/name:      wolf-engine
    app.kubernetes.io/component: secrets
    app.kubernetes.io/managed-by: kubeseal   # remove if not using Sealed Secrets
  annotations:
    # Human-readable rotation schedule reminder.
    wolf.security/rotate-after: "90d"
    # Which team owns this secret's lifecycle.
    wolf.security/owner: "platform-team"

# StringData lets you write plain strings — k8s base64-encodes them automatically.
# Switch to `data:` + base64 values if your pipeline injects pre-encoded blobs.
stringData:

  # ── Server ─────────────────────────────────────────────────────────────────

  NODE_ENV: "production"
  PORT:     "3000"
  BASE_URL: "https://wolf-engine.example.com"
  AUDIO_DIR: "/app/audio"

  # ── Security ───────────────────────────────────────────────────────────────
  # Minimum 32 characters each.  Generate with:
  #   openssl rand -base64 48

  PHONE_SALT:         "REPLACE_WITH_MINIMUM_16_CHAR_SALT"
  JWT_SECRET:         "REPLACE_WITH_MINIMUM_32_CHAR_SECRET_FOR_ACCESS_TOKENS"
  JWT_REFRESH_SECRET: "REPLACE_WITH_MINIMUM_32_CHAR_SECRET_FOR_REFRESH_TOKENS"

  # Comma-separated list of pre-shared API keys for service-to-service calls.
  # Generate each key with:  openssl rand -hex 32
  API_KEYS: "REPLACE_WITH_KEY_1,REPLACE_WITH_KEY_2"

  # Comma-separated allowed CORS origins.
  CORS_ORIGINS: "https://wolf-engine.example.com"

  # ── Twilio ──────────────────────────────────────────────────────────────────

  TWILIO_ACCOUNT_SID: "REPLACE_WITH_TWILIO_ACCOUNT_SID"
  TWILIO_AUTH_TOKEN:  "REPLACE_WITH_TWILIO_AUTH_TOKEN"
  TWILIO_PHONE:       "+1XXXXXXXXXX"

  # ── PostgreSQL ──────────────────────────────────────────────────────────────

  DB_HOST:     "postgres.wolf-engine.svc.cluster.local"
  DB_PORT:     "5432"
  DB_USER:     "wolf"
  DB_PASSWORD: "REPLACE_WITH_STRONG_DB_PASSWORD"
  DB_NAME:     "wolf_engine"

  # ── Redis ───────────────────────────────────────────────────────────────────

  REDIS_URL: "redis://:REPLACE_WITH_REDIS_PASSWORD@redis.wolf-engine.svc.cluster.local:6379/0"

  # ── Ollama / NLU ────────────────────────────────────────────────────────────

  OLLAMA_URL:     "http://ollama.wolf-engine.svc.cluster.local:11434"
  OLLAMA_MODEL:   "llama3.2:3b"
  OLLAMA_TIMEOUT: "120000"

  # ── TTS ─────────────────────────────────────────────────────────────────────

  TTS_PROVIDER:        "piper"
  PIPER_MODEL_PATH:    "/models/fr_FR-siwis-medium.onnx"

  # Uncomment if using ElevenLabs:
  # TTS_PROVIDER:        "elevenlabs"
  # ELEVENLABS_API_KEY:  "REPLACE_WITH_ELEVENLABS_KEY"
  # ELEVENLABS_VOICE_ID: "21m00Tcm4TlvDq8ikWAM"

  # Uncomment if using Azure Cognitive Services TTS:
  # TTS_PROVIDER:    "azure"
  # AZURE_TTS_KEY:   "REPLACE_WITH_AZURE_KEY"
  # AZURE_TTS_REGION: "westeurope"
  # AZURE_TTS_VOICE:  "fr-FR-DeniseNeural"

  # ── STT / Whisper ────────────────────────────────────────────────────────────

  WHISPER_BACKEND:    "local-server"
  WHISPER_SERVER_URL: "http://whisper.wolf-engine.svc.cluster.local:9000/transcribe"
  WHISPER_TIMEOUT:    "15000"

  # Uncomment if using OpenAI Whisper API:
  # WHISPER_BACKEND: "openai"
  # OPENAI_API_KEY:  "REPLACE_WITH_OPENAI_KEY"

  # ── Claude (Anthropic) ───────────────────────────────────────────────────────

  CLAUDE_API_KEY: "REPLACE_WITH_ANTHROPIC_API_KEY"
  CLAUDE_MODEL:   "claude-haiku-4-5-20251001"

  # ── Agent / Events ───────────────────────────────────────────────────────────

  EVENTS_FILE: "/app/data/events.json"
  MAX_EVENTS:  "500"
  SMS_TONE:    "friendly"

  # ── OpenTelemetry ────────────────────────────────────────────────────────────

  OTEL_ENABLED:  "true"
  OTEL_ENDPOINT: "http://otel-collector.wolf-engine.svc.cluster.local:4318"
