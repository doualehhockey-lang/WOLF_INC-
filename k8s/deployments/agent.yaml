# k8s/deployments/agent.yaml — Wolf Engine main application (stable).
#
# The "agent" is the Node.js Express server that orchestrates the full
# ML pipeline: STT (Whisper) → NLU (Claude) → Enrichment (Ollama) → TTS.
#
# Endpoints exposed by this pod:
#   :3000  — HTTP API + /health/live + /health/ready + /metrics
#   :4317  — OTel OTLP gRPC (sidecar collector, internal only)
#   :8889  — OTel Prometheus scrape (sidecar collector, internal only)
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent
  namespace: wolf-engine
  labels:
    app:                         wolf-engine
    app.kubernetes.io/name:      wolf-engine
    app.kubernetes.io/component: agent
    stage:                       stable
    version:                     "2.0.0"
  annotations:
    # kubectl rollout history deployment/agent -n wolf-engine
    kubernetes.io/change-cause: "initial deployment"
spec:
  replicas: 2

  # ── Rolling update strategy ─────────────────────────────────────────────────
  # At most 1 pod unavailable + 1 surge → never fully down.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge:       1

  selector:
    matchLabels:
      app:   wolf-engine
      stage: stable

  template:
    metadata:
      labels:
        app:                         wolf-engine
        app.kubernetes.io/name:      wolf-engine
        app.kubernetes.io/component: agent
        stage:                       stable
        version:                     "2.0.0"
      annotations:
        # Prometheus scrapes the otelcol sidecar's metrics port, not the app.
        prometheus.io/scrape: "true"
        prometheus.io/port:   "8889"
        prometheus.io/path:   "/metrics"

    spec:
      serviceAccountName: wolf-engine-sa
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser:    1000   # wolf user (same as Dockerfile)
        fsGroup:      1000

      # ── Anti-affinity: spread pods across nodes ─────────────────────────────
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app:   wolf-engine
                    stage: stable
                topologyKey: kubernetes.io/hostname

      containers:
        # ── Main application container ────────────────────────────────────────
        - name: wolf-engine
          image: ghcr.io/doualeh/wolf_inc-:sha-latest   # CI replaces this tag
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP

          envFrom:
            - secretRef:
                name: wolf-engine-secrets

          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            # Propagate pod metadata for structured logs / traces
            - name: POD_NAME
              valueFrom:
                fieldRef: { fieldPath: metadata.name }
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef: { fieldPath: metadata.namespace }
            - name: POD_NODE_NAME
              valueFrom:
                fieldRef: { fieldPath: spec.nodeName }

          resources:
            requests:
              cpu:    "200m"
              memory: "256Mi"
            limits:
              cpu:    "1000m"
              memory: "1Gi"

          # ── Probes ──────────────────────────────────────────────────────────
          # Readiness: pod only enters the load-balancer pool when the app + DB
          # connections are healthy.
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds:       5
            failureThreshold:    3
            successThreshold:    1
            timeoutSeconds:      3

          # Liveness: restart the pod if the event loop hangs.
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 20
            periodSeconds:       15
            failureThreshold:    3
            timeoutSeconds:      5

          # Startup: generous window for cold starts (DB migrations, prewarm).
          startupProbe:
            httpGet:
              path: /health/live
              port: http
            failureThreshold: 12    # 12 × 5s = 60s max startup time
            periodSeconds:    5

          volumeMounts:
            - name: audio-data
              mountPath: /app/public/audio

        # ── OTel Collector sidecar ────────────────────────────────────────────
        # Receives OTLP from the app on localhost:4317/4318, exports to Tempo
        # and exposes a Prometheus scrape endpoint on :8889.
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.101.0
          args: ["--config=/etc/otel/config.yaml"]
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
            - name: prom-metrics
              containerPort: 8889
          resources:
            requests:
              cpu:    "50m"
              memory: "64Mi"
            limits:
              cpu:    "200m"
              memory: "256Mi"
          securityContext:
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: otel-config
              mountPath: /etc/otel
              readOnly: true

      volumes:
        - name: audio-data
          persistentVolumeClaim:
            claimName: wolf-audio-pvc
        - name: otel-config
          configMap:
            name: otel-collector-config

---
# PodDisruptionBudget — guarantee at least 1 pod stays up during drains.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: agent-pdb
  namespace: wolf-engine
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app:   wolf-engine
      stage: stable

---
# ServiceAccount — least-privilege identity for the agent pods.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: wolf-engine-sa
  namespace: wolf-engine
  labels:
    app.kubernetes.io/name: wolf-engine

---
# PersistentVolumeClaim — audio file storage shared by all agent replicas.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wolf-audio-pvc
  namespace: wolf-engine
spec:
  accessModes: [ReadWriteMany]   # NFS or CSI driver required for multi-pod access
  storageClassName: "standard"    # Replace with your cluster's RWX storage class
  resources:
    requests:
      storage: 10Gi
