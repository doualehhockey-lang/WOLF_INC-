# k8s/namespace.yaml — Wolf Engine namespace with resource quotas.
#
# Apply first:
#   kubectl apply -f k8s/namespace.yaml
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: Namespace
metadata:
  name: wolf-engine
  labels:
    app.kubernetes.io/name:       wolf-engine
    app.kubernetes.io/managed-by: kubectl

---
# ResourceQuota — guard against runaway pods consuming cluster resources.
apiVersion: v1
kind: ResourceQuota
metadata:
  name: wolf-engine-quota
  namespace: wolf-engine
spec:
  hard:
    requests.cpu:    "8"
    requests.memory: 16Gi
    limits.cpu:      "16"
    limits.memory:   32Gi
    pods:            "50"

---
# LimitRange — default resource limits for pods that don't specify their own.
apiVersion: v1
kind: LimitRange
metadata:
  name: wolf-engine-limits
  namespace: wolf-engine
spec:
  limits:
    - type: Container
      default:
        cpu:    "500m"
        memory: "512Mi"
      defaultRequest:
        cpu:    "100m"
        memory: "128Mi"
      max:
        cpu:    "4"
        memory: "4Gi"
