global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alerts.yml
  - alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: [alertmanager:9093]

scrape_configs:
  - job_name: wolf-engine
    static_configs:
      - targets: [app:3000]
    metrics_path: /metrics
    scrape_interval: 10s
