# infra/prometheus/alertmanager.yml
#
# Routing: critical alerts go to Slack; all alerts also hit a generic webhook.
# Both destinations are controlled by environment variables — set them in
# docker-compose.yml or your secret manager; never hard-code URLs here.
#
# Required env vars (set via docker-compose environment: section):
#   SLACK_WEBHOOK_URL     — Slack incoming webhook URL (optional; omit to disable)
#   ALERT_WEBHOOK_URL     — Generic HTTP webhook URL   (optional; omit to disable)
#   ALERT_WEBHOOK_TOKEN   — Bearer token for generic webhook (optional)
#
# AlertManager reads env vars at startup via Go template substitution when
# launched with --config.expand-env=true.

global:
  resolve_timeout: 5m
  # Slack API URL is set per-receiver; global url is unused.

route:
  receiver: 'default'
  group_by: ['alertname', 'severity']
  group_wait:      30s
  group_interval:  5m
  repeat_interval: 4h

  routes:
    # Critical alerts: notify immediately, repeat every hour.
    - match:
        severity: critical
      receiver: 'critical'
      group_wait:      10s
      repeat_interval: 1h

receivers:
  # ── Default: generic webhook (all severities) ─────────────────────────────
  - name: 'default'
    webhook_configs:
      - url: '${ALERT_WEBHOOK_URL:-http://localhost:9999/no-op}'
        send_resolved: true
        http_config:
          bearer_token: '${ALERT_WEBHOOK_TOKEN:-}'

  # ── Critical: Slack + generic webhook ────────────────────────────────────
  - name: 'critical'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_URL:-https://hooks.slack.com/services/PLACEHOLDER}'
        channel: '#wolf-alerts'
        send_resolved: true
        title: '[{{ .Status | toUpper }}] {{ .CommonAnnotations.summary }}'
        text: '{{ .CommonAnnotations.description }}'
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
    webhook_configs:
      - url: '${ALERT_WEBHOOK_URL:-http://localhost:9999/no-op}'
        send_resolved: true
        http_config:
          bearer_token: '${ALERT_WEBHOOK_TOKEN:-}'

inhibit_rules:
  # Suppress warnings when a critical alert is already firing for the same service.
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
